version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Command to run Prisma migrations before starting the Next.js app
    # This ensures the database schema is up-to-date.
    command: sh -c "npx prisma migrate deploy && node server.js"
    ports:
      - "3000:3000"
    environment:
      # These variables should ideally be managed by a .env file or Docker secrets in production
      # For local development, we can pass them directly or use a .env file in the host
      NODE_ENV: production
      # Add other environment variables as needed for local development
      # e.g., CLERK_SECRET_KEY, NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY, GEMINI_API_KEY, INNGEST_EVENT_KEY, INNGEST_SIGNING_KEY
    env_file:
      - .env # Standard for local development, will read variables from a .env file in the same directory
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"] # Assuming a health check endpoint
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pathfinder-ai
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pathfinder-ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  db-data:
  redis-data:

networks:
  app-network:
    driver: bridge
